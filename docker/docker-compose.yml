services:
  zookeeper-1:
    container_name: zookeeper-1
    image: zookeeper
    hostname: zookeeper-1
    restart: unless-stopped
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"
    environment:
      ZOO_MY_ID: 1
      ZOO_STANDALONE_ENABLED: "true"
      ZOO_ADMINSERVER_ENABLED: "true"
      ZOO_TICK_TIME: 2000
      ZOO_INIT_LIMIT: 5
      ZOO_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - kafka-net

  kafka:
    container_name: ${KAFKA_CONTAINER_NAME}
    image: ${KAFKA_IMAGE}
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      ZOOKEEPER: zookeeper-1:2181
      ADVERTISED_LISTENER: localhost
      EXTERNAL_PORT: 19092
    depends_on:
      zookeeper-1:
        condition: service_healthy
    networks:
      - kafka-net

