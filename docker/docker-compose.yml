services:
  zookeeper-1:
    container_name: zookeeper-1
    image: zookeeper:3.8
    hostname: zookeeper-1
    restart: unless-stopped
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"
    environment:
      ZOO_MY_ID: 1
      ZOO_STANDALONE_ENABLED: "true"
      ZOO_ADMINSERVER_ENABLED: "true"
      ZOO_TICK_TIME: 2000
      ZOO_INIT_LIMIT: 5
      ZOO_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - kafka-net

  kafka:
    container_name: ${KAFKA_CONTAINER_NAME:-kafka}
    image: ${KAFKA_IMAGE:-bitnami/kafka:3.6}
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      ZOOKEEPER: zookeeper-1:2181          # used by start-kafka.sh → zookeeper.connect
      ADVERTISED_LISTENER: localhost        # used by start-kafka.sh → advertised.listeners EXTERNAL host
      EXTERNAL_PORT: 19092
    depends_on:
      zookeeper-1:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-net

#  kafka-admin-boot:
#    image: ghcr.io/zalando-incubator/kafka-admin-boot:latest
#    container_name: kafka-admin-boot
#    ports:
#      - '8080:8080'
#    environment:
#      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,localhost:19092
#    depends_on:
#      - kafka

networks:
  kafka-net:
    driver: bridge

volumes:
  zookeeper-data:
    name: ${ZOOKEEPER_DATA_VOLUME:-zookeeper-data}
  zookeeper-logs:
    name: ${ZOOKEEPER_LOGS_VOLUME:-zookeeper-logs}
  kafka-data:
    name: ${KAFKA_DATA_VOLUME:-kafka-data}
